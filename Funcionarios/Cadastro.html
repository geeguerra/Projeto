    <header class="header">

        <div class="titulo-logo">
            <img src="../assets/logo.png" alt="Logo" class="logo">
            <h1>Sistema de Gestão | Succeed & Failed</h1>
        </div>
    
        <nav id="menu">

        </nav>
    </header>
    

        <form class="card-form" id="formCadastro">

            <h2>Cadastro de Funcionário</h2>

            <p class="subtitle">
                Preencha seus dados para continuar
                
            </p>

            <div class="form-grid">

                <div class="input-group">
                    <label>Nome completo/Empresa *</label>

                    <input type="text" placeholder="Digite o nome completo ou empresa">
                </div>

                <div class="input-group">
                    <label>Data de nascimento *</label>

                    <input type="text" placeholder="dd/mm/aaaa">
                </div>

                <div class="input-group">
                    <label>Bairro *</label>

                    <input type="text" placeholder="Digite o bairro">
                </div>

                <div class="input-group">
                    <label>E-mail *</label>

                    <input type="email" placeholder="Exemplo@gmail.com">
                </div>

                <div class="input-group">
                    <label>Nº da casa *</label>

                    <input type="text" placeholder="Digite o numero">
                </div>

                <div class="input-group">
                    <label>Telefone *</label>

                    <input type="text" placeholder="(00)00000-0000">
                </div>

                <div class="input-group">
                    <label>CPF *</label>

                    <input type="text" placeholder="00.000.000-00">
                </div>

                <div class="input-group">
                    <label>Complemento *</label>

                    <input type="text" placeholder="Exemplo completo: Bloco B, Apto 301">
                </div>

                <div class="input-group">
                    <label>CNPJ *</label>

                    <input type="text" placeholder="00.000.000/0000-00">
                </div>

                <div class="input-group">
                    <label>Cep *</label>

                    <input type="text" placeholder="00000-000">
                </div>

                <div class="input-row-special">

                    <div class="input-group">

                        <label>Cidade *</label>

                        <input type="text" placeholder="Digite a cidade">
                    </div>

                    <div class="input-group">

                        <label>Estado *</label>

                        <select>

                            <option>Selecione ▾</option>
                            <option>São Paulo</option>
                            <option>Minas Gerais</option>
                            <option>Rio de Janeiro</option>
                            <option>Santa Catarina</option>
                            <option>Bahia</option>

                        </select>

                    </div>

                </div>

                <div class="input-group full-width">

                    <label>Endereço *</label>

                    <input type="text" placeholder="Digite o seu Endereço....">

                </div>

            </div>

            <button type="submit" class="btn-submit">
                Cadastrar
            </button>

        </form>

    </main>

   <script src="Cadastro.js"></script>

</body>
</html>
