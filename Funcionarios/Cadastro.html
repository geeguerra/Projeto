<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão</title>

    <link rel="stylesheet" href="Cadastro.css">
    <link rel="stylesheet" href="../hearder.css">
<body>

    <header class="header">

        <div class="titulo-logo">
            <img src="../assets/logo.png" alt="Logo" class="logo">
            <h1>Sistema de Gestão | Succeed & Failed</h1>
        </div>
    
        <nav id="menu">            
            <a href="../SobreOProduto/SobreOProduto.html"></a> 
            <a href="../Produto/">Pedido</a>  
              <a href="../Funcionarios/Listagem.js">Listagem Funcionário</a>
              <a href="../ClienteFornecedor/Cadastro.html">Fornecedores e Clientes</a>
              <a href="../Estoque/Cadastro.html">Estoque</a>    
              <a href="../Financeiro/Cadastro.html">Financeiro</a>
              <a href="../Financeiro/Pagamento.html">Pagamento</a>

        </nav>
    </header>
    

    <main class="container">

        <form class="card-form" id="formCadastro">
    
            <h2>Cadastro de Funcionário</h2>
    
            <p class="subtitle">
                Preencha os dados do funcionário para continuar
            </p>
    
            <div class="form-grid">
    
                <div class="input-group">
                    <label>Nome *</label>
                    <input type="text" id="nome" placeholder="Digite o nome do funcionário" required>
                </div>
    
                <div class="input-group">
                    <label>Cargo *</label>
                    <input type="text" id="cargo" placeholder="Digite o cargo (ex: Desenvolvedor)" required>
                </div>
    
                <div class="input-group">
                    <label>Salário *</label>
                    <input type="number" id="salario" step="0.01" placeholder="0.00" required>
                </div>
    
            </div>
    
            <button type="submit" class="btn-submit">
                Cadastrar
            </button>
    
        </form>
    
    </main>

    <script src="Cadastro.js"></script>

</body>

</html>
