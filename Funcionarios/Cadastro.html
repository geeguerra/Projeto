<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão</title>

    <link rel="stylesheet" href="Cadastro.css">
    <link rel="stylesheet" href="../hearder.css">
<body>

    <header class="header">

        <div class="titulo-logo">
            <img src="../assets/logo.png" alt="Logo" class="logo">
            <h1>Sistema de Gestão | Succeed & Failed</h1>
        </div>
    
        <nav id="menu">            
            <a href="../Login/Cadastro.html">Login</a>
            <a href="../../Financeiro/Cadastro.html">RH</a>
            <a href="../Funcionarios/Listagem.html">Funcionários</a>
            <a href="../Estoque/Cadastro.html">Estoque</a>
            <a href="../Fornecedor/FornecedorCliente.html">Fornecedores</a>
            <a href="../Produto/Cadastro.html">Produtos</a>
            <a href="../Estoque/Cadastro.html">Estoque</a>
            <a href="../Financeiro/Pagamento.html">Pagamento</a>
            <a href="../Fornecedor/FornecedorCliente.html">Clientes</a>
            <a href="../Pedido/Cadastro.html">Pedido</a>
            <a href="../Pedido/Listagem.html">Listagem</a>

        </nav>
    </header>
    

    <main class="container">

        <form class="card-form" id="formCadastro">

            <h2>Cadastro de Funcionário</h2>

            <p class="subtitle">
                Preencha seus dados para continuar
            </p>

            <div class="form-grid">

                <div class="input-group">
                    <label>Nome completo/Empresa *</label>
                    <input type="text" placeholder="Digite o nome completo ou empresa" required>
                </div>

                <div class="input-group">
                    <label>Data de nascimento *</label>
                    <input type="date" id="dataNascimento" required>
                </div>

                <div class="input-group">
                    <label>Bairro *</label>
                    <input type="text" placeholder="Digite o bairro" required>
                </div>

                <div class="input-group">
                    <label>E-mail *</label>
                    <input type="email" placeholder="Exemplo@gmail.com" required>
                </div>

                <div class="input-group">
                    <label>Nº da casa *</label>
                    <input type="text" placeholder="Digite o número" required>
                </div>

                <div class="input-group">
                    <label>Telefone *</label>
                    <input type="text" placeholder="(00)00000-0000" required>
                </div>

                <div class="input-group">
                    <label>CPF *</label>
                    <input type="text" placeholder="000.000.000-00" required>
                </div>

                <div class="input-group">
                    <label>Complemento *</label>
                    <input type="text" placeholder="Exemplo: Bloco B, Apto 301" required>
                </div>

                <div class="input-group">
                    <label>CNPJ *</label>
                    <input type="text" placeholder="00.000.000/0000-00" required>
                </div>

                <div class="input-group">
                    <label>CEP *</label>
                    <input type="text" placeholder="00000-000" required>
                </div>

                <div class="input-row-special">

                    <div class="input-group">
                        <label>Cidade *</label>
                        <input type="text" placeholder="Digite a cidade" required>
                    </div>

                    <div class="input-group">
                        <label>Estado *</label>

                        <select required>
                            <option value="">Selecione</option>
                            <option>São Paulo</option>
                            <option>Minas Gerais</option>
                            <option>Rio de Janeiro</option>
                            <option>Santa Catarina</option>
                            <option>Bahia</option>
                        </select>

                    </div>

                </div>

                <div class="input-group full-width">
                    <label>Endereço *</label>
                    <input type="text" placeholder="Digite o seu endereço..." required>
                </div>

            </div>

            <button type="submit" class="btn-submit">
                Cadastrar
            </button>

        </form>

    </main>

    <script src="Cadastro.js"></script>

</body>

</html>
