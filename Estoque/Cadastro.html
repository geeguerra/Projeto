<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Estoque</title>

    <link rel="stylesheet" href="Cadastro.css">
    <link rel="stylesheet" href="../hearder.css">
</head>

<body>

 <header class="header">

        <div class="titulo-logo">
            <img src="../../assets/logo.png" alt="Logo" class="logo">
            <h1>Sistema de Gestão | Succeed & Failed</h1>
        </div>
    
        <nav id="menu">            
          

        <a href="../index.html">Login</a> 
        <a href="../ClienteFornecedor/Listagem.html">Fornecedores e Clientes</a>
        <a href="../Produto/Listagem.html">Produtos</a>
        <a href="../Funcionarios/Listagem.html">Funcionários</a>
        <a href="../Pedido/Cadastro.html">Pedido</a>
        <a href="../Estoque/Cadastro.html">Estoque</a>
        <a href="../SobreOProduto/SobreOProduto.html">Sobre Produto</a>




        </nav>
        </header>

<main class="ContainerEstoque">

    <div class="cardEstoque">

        <h2>Movimentação de estoque</h2>

        <div class="formulario">

            <div class="campo">

                <select id="produto">

                    <option selected disabled value="">
                        Produtos
                    </option>

                </select>

            </div>

            <div class="campo">

                <select id="tipoMovimentacao">

                    <option selected disabled value="">
                        Entrada/Saída
                    </option>

                    <option value="Entrada">
                        Entrada
                    </option>

                    <option value="Saida">
                        Saída
                    </option>

                </select>

            </div>

            <div class="campo">

                <input
                    type="number"
                    id="quantidade"
                    placeholder="Quantidade"
                >

            </div>

            <div class="campo">

                <input
                    type="date"
                    id="dataMovimentacao"
                >

            </div>

        </div>

        <div class="acoes">

            <button id="btnEstoque">

                <p class="titulobutton">
                    Lançar Estoque
                </p>

            </button>

        </div>

        <table class="tabelaEstoque">

            <thead>

                <tr>

                    <th>Produto</th>
                    <th>Tipo</th>
                    <th>Quantidade</th>
                    <th>Data</th>
                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="tbodyEstoque">

            </tbody>

        </table>

    </div>

</main>

<script src="Estoque.js"></script>

</body>
</html>
