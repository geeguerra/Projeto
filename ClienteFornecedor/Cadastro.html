<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão</title>

    <link rel="stylesheet" href="../../hearder.css">
    <link rel="stylesheet" href="Cadatros.css">

    
</head>

<body>

    <header class="header">

        <div class="titulo-logo">
            <img src="../../assets/logo.png" alt="Logo" class="logo">
            <h1>Sistema de Gestão | Succeed & Failed</h1>
        </div>
    
        <nav id="menu">            
        <a href="../index.html">Login</a> 
        <a href="../Produto/Listagem.html">Produtos</a>
        <a href="../Funcionarios/Listagem.html">Funcionários</a>
        <a href="../Pedido/Cadastro.html">Pedido</a>
        <a href="../Financeiro/Pagamento.html">Pagamento</a>
        <a href="../Estoque/Cadastro.html">Estoque</a>
        <a href="../SobreOProduto/SobreOProduto.html">Sobre Produto</a>

        </nav>
        </header>
    

    <main class="container">
   <form class="card-form">
    <h2>Cadastro de Fornecedor e Cliente</h2>
    <p class="subtitle">Preencha seus dados para continuar</p>

    <div class="form-grid">

        <div class="input-group">
            <label>Nome completo/Empresa *</label>
            <input type="text" id="nome" placeholder="Digite o nome completo ou empresa">
        </div>

        <div class="input-group">
            <label>Data de nascimento *</label>
            <input type="date" id="dataNascimento">
        </div>

        <div class="input-group">
            <label>Bairro *</label>
            <input type="text" id="bairro" placeholder="Digite o bairro">
        </div>

        <div class="input-group">
            <label>E-mail *</label>
            <input type="email" id="email" placeholder="Exemplo@gmail.com">
        </div>

        <div class="input-group">
            <label>Produto/Serviço fornecido *</label>
            <input type="text" id="produtoServico" placeholder="Digite o produto ou serviço">
        </div>

        <div class="input-group">
            <label>Nº da casa *</label>
            <input type="text" id="numeroCasa" placeholder="Digite o número">
        </div>

        <div class="input-group">
            <label>Telefone *</label>
            <input type="text" id="telefone" placeholder="(00)00000-0000">
        </div>

        <div class="input-group">
            <label>CPF *</label>
            <input type="text" id="cpf" placeholder="00.000.000-00">
        </div>

        <div class="input-group">
            <label>Complemento *</label>
            <input type="text" id="complemento" placeholder="Exemplo: Bloco B, Apto 301">
        </div>

        <div class="input-group">
            <label>CNPJ *</label>
            <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
        </div>

        <div class="input-group">
            <label>CEP *</label>
            <input type="text" id="cep" placeholder="00000-000">
        </div>

        <div class="input-row-special">
            <div class="input-group">
                <label>Cidade *</label>
                <input type="text" id="cidade" placeholder="Digite a cidade">
            </div>

            <div class="input-group">
                <label>Estado *</label>
                <select id="estado">
                    <option value="">Selecione</option>
                    <option value="São Paulo">São Paulo</option>
                    <option value="Minas Gerais">Minas Gerais</option>
                    <option value="Rio de Janeiro">Rio de Janeiro</option>
                    <option value="Santa Catarina">Santa Catarina</option>
                    <option value="Bahia">Bahia</option>
                </select>
            </div>
        </div>

        <div class="input-group full-width">
            <label>Endereço *</label>
            <input type="text" id="endereco" placeholder="Digite o seu endereço">
        </div>

        <div class="input-group">
            <label>Tipo *</label>
            <select id="tipo">
                <option value="">Selecione</option>
                <option value="Fornecedor">Fornecedor</option>
                <option value="Cliente">Cliente</option>
            </select>
        </div>

    </div>

    <button type="submit" class="btn-submit">
        Cadastrar
    </button>
</form>

<script src="Cadastro.js"></script>
    </main>

</body>
</html>
