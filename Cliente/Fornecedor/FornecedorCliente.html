<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão</title>
    <link rel="stylesheet" href="FornecedorCliente.css">
    <link rel="stylesheet" href=""><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    
</head>

<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="img/image.png" alt="logo">
             <h1>Sistema de Gestão | <span>Succeed & Failed</span></h1>
        </div>
    </header>

    <main class="container">
        <form class="card-form">
            <h2>Cadastro de Fornecedor, Cliente e Funcionário</h2>
            <p class="subtitle">Preencha seus dados para continuar</p>

            <div class="form-grid">
                <div class="input-group">
                    <label>Nome completo/Empresa *</label>
                    <input type="text" placeholder="Digite o nome completo ou empresa">
                </div>

                <div class="input-group">
                    <label>Data de nascimento *</label>
                    <input type="text" placeholder="dd/mm/aaaa">
                </div>

                <div class="input-group">
                    <label>Bairro *</label>
                    <input type="text" placeholder="Digite o bairro">
                </div>

                <div class="input-group">
                    <label>E-mail *</label>
                    <input type="email" placeholder="Exemplo@gmail.com">
                </div>

                <div class="input-group">
                    <label>Produto/Serviço fornecido *</label>
                    <input type="text" placeholder="Digite o produto ou serviço">
                </div>

                <div class="input-group">
                    <label>Nº da casa *</label>
                    <input type="text" placeholder="Digite o numero">
                </div>

                <div class="input-group">
                    <label>Telefone *</label>
                    <input type="text" placeholder="(00)00000-0000">
                </div>

                <div class="input-group">
                    <label>CPF *</label>
                    <input type="text" placeholder="00.000.000-00">
                </div>

                <div class="input-group">
                    <label>Complemento *</label>
                    <input type="text" placeholder="Exemplo completo: Bloco B, Apto 301">
                </div>

                <div class="input-group">
                    <label>CNPJ*</label>
                    <input type="text" placeholder="00.000.000/0000-00">
                </div>

                <div class="input-group">
                    <label>Cep *</label>
                    <input type="text" placeholder="00000-0000">
                </div>

                <div class="input-row-special">
                    <div class="input-group">
                        <label>Cidade *</label>
                        <input type="text" placeholder="Digite a cidade">
                    </div>
                    <div class="input-group">
                        <label>Estado *</label>
                        <select>
                            <option>Selecione ▾</option>
                            <option value="São Paulo">São Paulo</option>
                            <option value="Minas Gerais">Minas Gerais</option>
                            <option value="Rio de Janeiro">Rio de Janeiro</option>
                            <option value="Santa Catarina">Santa Catarina</option>
                            <option value="Bahia">Bahia</option>
                        </select>
                    </div>
                </div>

                <div class="input-group full-width">
                    <label>Endereço *</label>
                    <input type="text" placeholder="Digite o seu Endereço....">
                </div>

                <div class="input-group">
                    <label>Tipo * :</label>
                    <select>
                        <option>Selecione ▾</option>
                        <option value="Fornecedor">Fornecedor</option>
                        <option value="Cliente">Cliente</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>
    </main>

</body>
</html>
