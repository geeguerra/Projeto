<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão - Produto</title>
    <link rel="stylesheet" href="Cadastro.css">
    <link rel="stylesheet" href="../header.css">

    <!--Link da Fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- header -->
    <header class="header">
          <div class="titulo-logo">
       <img src="../assets/logo.png" alt="Logo" class="logo">
        <h1>Sistema de Gestão | Succeed & Failed</h1>
    </div>   
    </header>

<main class="container">

  <div class="card">
    <h2>Lista de produto</h2>

    
    
    <table>
      <tbody>

        <tr>
          <td><div class="imgbloco"></div></td>
          <td>Nome do produto</td>
          <td>Código</td>
          <td class="verde">Qtd Estoque</td>
          <td>R$:0,00</td>
        </tr>

        <tr>
          <td><div class="imgbloco"></div></td>
          <td>Nome do produto</td>
          <td>Código</td>
          <td class="vermelho">Baixa quantidade</td>
          <td>R$:0,00</td>
        </tr>

        <tr>
          <td><div class="imgbloco"></div></td>
          <td>Nome do produto</td>
          <td>Código</td>
          <td class="amarelo">Média Quantidade</td>
          <td>R$:0,00</td>
        </tr>

      </tbody>
    </table>

    <!-- botão -->
    <div class="acoes">
      <p>Atualizar Estoque</p>
      <button> <p class="titulobutton">Estoque</p></button>
    </div>

  </div>

</main>
