<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão</title>
    <link rel="stylesheet" href="Cadastro.css">
    <link rel="stylesheet" href="../hearder.css">
</head>
<body>

   <header class="header">

    <div class="titulo-logo">
        <img src="../assets/logo.png" alt="Logo" class="logo">
        <h1>Sistema de Gestão | Succeed & Failed</h1>
    </div>

    <nav id="menu">            
        <a href="../index.html">Login</a> 
        <a href="../ClienteFornecedor/Listagem.html">Fornecedores e Clientes</a>
        <a href="../Produto/Listagem.html">Produtos</a>
        <a href="../Funcionarios/Listagem.html">Funcionários</a>
        <a href="../Financeiro/Pagamento.html">Pagamento</a>
        <a href="../Estoque/Cadastro.html">Estoque</a>
        <a href="../SobreOProduto/SobreOProduto.html">Sobre Produto</a>

    </nav>
</header>



<main>


    <main>

    <div class="card-container">
      <header class="card-header">
          <h2>Cadastro de Pedido</h2>
          <p>Registre uma nova venda/pedido</p>
      </header>

      <form class="order-form" id="form-pedido">
          <div class="form-row">
              <div class="form-group">
                  <label>Data</label>
                  <input type="date" id="pedido-data" placeholder="dd/mm/aa">
              </div>
              <div class="form-group">
                  <label>Status</label>

                  <select id="pedido-status">
                      <option value="Em andamento">Em andamento</option>
                      <option value="Concluído">Concluído</option>
                      <option value="Cancelado">Cancelado</option>

                  <select>
                      <option>Em andamento</option>

                  </select>
              </div>
              <div class="form-group">
                  <label>ID Cliente</label>
                  <input type="number" id="cliente-id" placeholder="Ex: 12" required>
              </div>
              <div class="form-group">
                  <label>Valor Unitário</label>
                  <input type="number" id="valor-unitario" placeholder="R$:0,00" readonly>
              </div>
          </div>

          <div class="form-row align-end">
              <div class="form-group flex-2">
                  <label>Produto</label>
                  <div class="input-with-btn">
                      <select id="produto">
                          <option selected disabled value="">Selecionar</option>
                      </select>
                      <button type="button" class="btn-add">+</button>
                  </div>
              </div>
              <div class="form-group flex-1">
                  <label>Quantidade</label>
                  <input type="number" id="quantidade" placeholder="Selecionar">
              </div>
          </div>

          <div class="order-summary">
              <div class="summary-item" id="box-lista-itens">
                  </div>
              
              <div class="summary-footer">
                  <p class="total-text">Valor total: <strong id="valor-total-geral">R$ 0,00</strong></p>
                  <button type="submit" class="btn-save">Salvar Pedido</button>
                  <a href="Listagem.html" class="btn-save" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">
                      Ver Listagem
                  </a>
              </div>
          </div>
      </form>
    </div>
</main>
  
  <script src="./cadastro.js"></script>
</body>
</html>
