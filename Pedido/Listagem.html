<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pedido</title>
    <link rel="stylesheet" href="Listagem.css">

</head>
<body>


  <!-- header -->
  <header class="header">
      
     

    <div class="titulo-logo">
  <img src="logo .png" alt="Logo" class="logo">
  <h1>Sistema de Gestão | Succeed & Failed</h1> 
   
  
  <select name="menu" id="Selecionar">
    <option>Selecionar</option>
  <option>Estoque <a href=""></a></option>
    <option>Funcinário</option>
    <option>Pedidos</option>
    <option>Produto</option>
    <option>Financeiro</option></select>
   
</div>
</header>



    <main class="container">

        <section class="card">

            <h2>Lista de pedido</h2>



            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text" placeholder="Buscar pedido">

            </div>

            <div class="pedido-lista">

                <div class="pedido-item">

                    <span>Pedido 1</span>

                    <span class="status andamento">
                        Em andamento
                    </span>

                    <span class="total">
                        Total:R$0,00
                    </span>

                </div>

                <div class="pedido-item">

                    <span>Pedido 2</span>

                    <span class="status cancelado">
                        Cancelado
                    </span>

                    <span class="total">
                        Total:R$0,00
                    </span>

                </div>

                <div class="pedido-item">

                    <span>Pedido 3</span>

                    <span class="status andamento">
                        Em andamento
                    </span>

                    <span class="total">
                        Total:R$0,00
                    </span>

                </div>

            </div>

        </section>

    </main>

</body>
</html>
