<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pedidos</title>

    <link rel="stylesheet" href="Listagem.css">
</head>
<body>

    <header class="header">

        <div class="logo-area">

            <img src="logo.png" alt="Logo">

            <h1>Sistema de Gestão | Succeed & Failed</h1>

        </div>

    </header>

    <main class="container">

        <section class="card">

            <h2>Lista de Produtos</h2>

            <div class="search-box">

                <input type="text" placeholder="Buscar produto">

            </div>

            <div class="pedido-lista">

                <div class="pedido-item">

                    <span>ID: 1</span>

                    <span>Cliente 1</span>

                    <span class="status andamento">
                        Em andamento
                    </span>

                    <span class="total">
                        Total: R$0,00
                    </span>

                </div>


                <div class="pedido-item">

                    <span>ID: 2</span>

                    <span>Cliente 2</span>

                    <span class="status cancelado">
                        Cancelado
                    </span>

                    <span class="total">
                        Total: R$0,00
                    </span>

                </div>

                <div class="pedido-item">

                    <span>ID: 3</span>

                    <span>Cliente 3</span>

                    <span class="status andamento">
                        Em andamento
                    </span>

                    <span class="total">
                        Total: R$0,00
                    </span>

                </div>

            </div>

        </section>

    </main>

</body>
</html>
