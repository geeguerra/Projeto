<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Estoque</title>
    <link rel="stylesheet" href="TelaEstoque.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="titulo-logo">
            <img src="../assets/logo.png" alt="Logo" class="logo">
            <h1>Sistema de Gestão | Succeed & Failed</h1>
        </div>
    </header>

    <main class="ContainerEstoque">
        <div class="cardEstoque">
            <h2>Movimentação de estoque</h2>

            <div class="formulario">
                <div class="campo">
                    <select>
                        <option selected disabled>Produtos</option>
                        <option>Produto Exemplo</option>
                    </select>
                </div>

                <div class="campo">
                    <select>
                        <option selected disabled>Entrada/Saída</option>
                        <option>Entrada</option>
                        <option>Saída</option>
                    </select>
                </div>

                <div class="campo">
                    <input type="number" placeholder="Quantidade">
                </div>

                <div class="campo">
                    <input type="text" placeholder="Data (dd/mm/aa)">
                </div>
            </div>

            <table class="tabelaEstoque">
                <thead>
                    <tr>
                      
                        
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Nome do produto</td>
                        <td>Entrada</td>
                        <td class="verde">Qtd Estoque</td>
                        <td>R$ 0,00</td>
                        <td>dd/mm/aa</td>
                        <td style="text-align: right;"><a href="#">Editar</a></td>
                    </tr>
                    <tr>
                        <td>Nome do produto</td>
                        <td>Saída</td>
                        <td class="vermelho">Baixa quantidade</td>
                        <td>R$ 0,00</td>
                        <td>dd/mm/aa</td>
                        <td style="text-align: right;"><a href="#">Editar</a></td>
                    </tr>
                    <tr>
                        <td>Nome do produto</td>
                        <td>Entrada</td>
                        <td class="amarelo">Média Quantidade</td>
                        <td>R$ 0,00</td>
                        <td>dd/mm/aa</td>
                        <td style="text-align: right;"><a href="#">Editar</a></td>
                    </tr>
                </tbody>
            </table>

            <div class="acoes">
                <button><p class="titulobutton">Estoque</p></button>
            </div>
        </div>
    </main>
    
</body>
</html>
