<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folha de Pagamento</title>
    <link rel="stylesheet" href="Pagamento.css">
</head>

<body>

<header>

    <div class="header-content">

        <div class="logo-box">
            <img src="logo.png" alt="Logo">
            <span>Succeed Failed</span>
        </div>

        <h1 class="titulo">Folha de Pagamento</h1>

    </div>

</header>

<main class="container">

<section class="card">

<h2>Cadastro de Pagamento</h2>

<form>

    <div class="linha-inputs">

        <div class="campo">
            <label for="funcionario">Funcionário</label>

            <select id="funcionario" name="funcionario">
                <option value="">Selecionar Funcionário</option>
                <option value="1">Funcionário 1</option>
                <option value="2">Funcionário 2</option>
                <option value="3">Funcionário 3</option>
            </select>
        </div>

        <div class="campo">
            <label for="data">Data de Pagamento</label>
            <input type="date" id="data">
        </div>

    </div>

    <div class="linha-inputs">

        <div class="campo">
            <label for="salario">Salário</label>
            <input type="number" id="salario" placeholder="Digite o salário">
        </div>

        <div class="campo">
            <label for="bonus">Bônus</label>
            <input type="number" id="bonus" placeholder="Digite o bônus">
        </div>

    </div>

    <div class="linha-inputs">

        <div class="campo">
            <label for="desconto">Desconto</label>
            <input type="number" id="desconto" placeholder="Digite o desconto">
        </div>

    </div>

    <div class="botoes">
        <button type="submit" class="btn-sec">Salvar</button>
        <button type="reset">Cancelar</button>
    </div>

</form>

<table>

    <thead>
        <tr>
            <th>Funcionário</th>
            <th>Salário</th>
            <th>Data</th>
        </tr>
    </thead>

    <tbody>

        <tr>
            <td>Funcionário 1</td>
            <td>R$ 3.000,00</td>
            <td>10/05/2026</td>
        </tr>

        <tr>
            <td>Funcionário 2</td>
            <td>R$ 4.500,00</td>
            <td>10/05/2026</td>
        </tr>

    </tbody>

</table>

</section>

</main>

</body>
</html>
